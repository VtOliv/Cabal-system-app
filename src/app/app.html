<div class="flex min-h-screen bg-gray-900">

  <!-- Sidebar -->
  <aside
    class="flex flex-col bg-gray-800 border-r border-gray-700 shadow-lg transition-all duration-300 ease-in-out overflow-hidden shrink-0"
    [class.w-64]="sidebarOpen"
    [class.w-16]="!sidebarOpen">

    <!-- Header / Toggle -->
    <div
      class="flex items-center h-14 px-3 border-b border-gray-700"
      [class.justify-between]="sidebarOpen"
      [class.justify-center]="!sidebarOpen">

      @if (sidebarOpen) {
        <span class="text-white font-bold text-lg tracking-wide">Menu</span>
      }

      <button
        (click)="toggleSidebar()"
        class="text-gray-300 hover:text-white p-1.5 rounded hover:bg-gray-700 transition">
        <!-- icon: hamburger / colapsar -->
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
    </div>

    <!-- Nav links -->
    <nav class="flex flex-col gap-1 p-2 mt-2">

      <a routerLink="/colecoes" routerLinkActive="!bg-blue-600 !text-white"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300 hover:bg-gray-700 hover:text-white transition"
         [class.justify-center]="!sidebarOpen">
        <img src="assets/colecao_final.png" alt="Coleções" class="w-5 h-5 shrink-0 object-contain" />
        @if (sidebarOpen) {
          <span class="font-medium whitespace-nowrap">Coleções</span>
        }
      </a>

      <a routerLink="/calculadora" routerLinkActive="!bg-blue-600 !text-white"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300 hover:bg-gray-700 hover:text-white transition"
         [class.justify-center]="!sidebarOpen">
        <img src="assets/image.png" alt="Calculadora de Asa" class="w-5 h-5 shrink-0 object-contain" />
        @if (sidebarOpen) {
          <span class="font-medium whitespace-nowrap">Calculadora de Asa</span>
        }
      </a>

      <!-- <a routerLink="/metas" routerLinkActive="!bg-blue-600 !text-white"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300 hover:bg-gray-700 hover:text-white transition"
         [class.justify-center]="!sidebarOpen">

        <span class="w-5 h-5 rounded bg-gray-500 shrink-0 inline-block"></span>
        @if (sidebarOpen) {
          <span class="font-medium whitespace-nowrap">Metas</span>
        }
      </a> 
        -->

      <a routerLink="/merito" routerLinkActive="!bg-blue-600 !text-white"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300 hover:bg-gray-700 hover:text-white transition"
         [class.justify-center]="!sidebarOpen">
        <!-- icon: Mérito -->
        <img src="assets/diamante.png" alt="Mérito" class="w-5 h-5 shrink-0 object-contain" />
        @if (sidebarOpen) {
          <span class="font-medium whitespace-nowrap">Mérito</span>
        }
      </a>

    </nav>

    <!-- Seletor de Personagem (visível só com sidebar aberta) -->
    @if (sidebarOpen) {
      <div class="mt-auto px-2 pb-3 pt-2 border-t border-gray-700">
        <app-character-selector />
      </div>
    }

  </aside>

  <!-- Conteúdo principal -->
  <main class="flex-1 overflow-auto">
    <router-outlet />
  </main>

</div>
