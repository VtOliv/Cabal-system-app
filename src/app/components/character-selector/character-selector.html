<!-- ── Character Selector ── -->
<div class="flex flex-col gap-1">

  <!-- Label + botão novo -->
  <div class="flex items-center justify-between px-1">
    <span class="text-[10px] text-gray-500 uppercase tracking-wider font-semibold">Personagem</span>
    <button (click)="abrirModal()"
      class="text-gray-500 hover:text-cyan-400 transition text-xs leading-none" title="Novo personagem">＋</button>
  </div>

  <!-- Lista de personagens -->
  @if (characterService.personagens().length === 0) {
    <p class="text-[10px] text-gray-600 px-1 italic">Nenhum personagem</p>
  }

  @for (p of characterService.personagens(); track p.id) {
    <div (click)="selecionar(p)"
      class="flex items-center gap-2 px-2 py-1.5 rounded-lg cursor-pointer transition border text-xs"
      [ngClass]="characterService.personagemAtivo()?.id === p.id
        ? 'bg-cyan-900/40 border-cyan-600 text-cyan-300'
        : 'bg-gray-700/30 border-transparent text-gray-400 hover:border-gray-600 hover:text-gray-200'">
      <!-- Avatar inicial -->
      <div class="w-6 h-6 rounded-full bg-gray-600 flex items-center justify-center shrink-0 text-[10px] font-bold uppercase"
           [ngClass]="characterService.personagemAtivo()?.id === p.id ? 'bg-cyan-700 text-white' : 'text-gray-300'">
        {{ p.nome.charAt(0) }}
      </div>
      <div class="flex-1 min-w-0">
        <p class="truncate font-medium leading-tight">{{ p.nome }}</p>
        <p class="text-[9px] text-gray-500 truncate">{{ p.classe }}</p>
      </div>
      <!-- Editar -->
      <button (click)="abrirModal(p); $event.stopPropagation()"
        class="shrink-0 text-gray-600 hover:text-yellow-400 transition text-[10px]" title="Editar">✎</button>
      <!-- Excluir -->
      <button (click)="excluir(p.id, $event)"
        class="shrink-0 text-gray-600 hover:text-red-400 transition text-[10px]" title="Excluir">✕</button>
    </div>
  }

</div>

<!-- ── Modal ── -->
@if (modalAberto()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm">
    <div class="bg-gray-800 border border-gray-700 rounded-xl p-5 w-80 flex flex-col gap-4 shadow-2xl">

      <h3 class="text-sm font-bold text-cyan-400">
        {{ modoEdicao() ? 'Editar Personagem' : 'Novo Personagem' }}
      </h3>

      <div class="flex flex-col gap-2.5">
        <div>
          <label class="block text-[10px] text-gray-400 mb-0.5">Nome</label>
          <input [(ngModel)]="form.nome" type="text" placeholder="Ex: Serafino"
            class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-1.5 text-white text-sm focus:outline-none focus:border-cyan-500 transition" />
        </div>
        <div>
          <label class="block text-[10px] text-gray-400 mb-0.5">Classe</label>
          <input [(ngModel)]="form.classe" type="text" placeholder="Ex: Mago"
            class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-1.5 text-white text-sm focus:outline-none focus:border-cyan-500 transition" />
        </div>

        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="block text-[10px] text-gray-400 mb-0.5">Mérito Dourado</label>
            <input [(ngModel)]="form.meritoDourado" type="number" min="0"
              class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-1.5 text-white text-sm focus:outline-none focus:border-yellow-500 transition" />
          </div>
          <div>
            <label class="block text-[10px] text-gray-400 mb-0.5">Mérito Platina</label>
            <input [(ngModel)]="form.meritoPlatina" type="number" min="0"
              class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-1.5 text-white text-sm focus:outline-none focus:border-cyan-500 transition" />
          </div>
        </div>

        <div>
          <label class="block text-[10px] text-gray-400 mb-0.5">Mérito Diamante</label>
          <input [(ngModel)]="form.meritoDiamante" type="number" min="0"
            class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-1.5 text-white text-sm focus:outline-none focus:border-blue-400 transition" />
        </div>

        <div>
          <label class="block text-[10px] text-gray-400 mb-0.5">Nível da Asa</label>
          <input [(ngModel)]="form.nivelAsa" type="number" min="0"
            class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-1.5 text-white text-sm focus:outline-none focus:border-purple-500 transition" />
        </div>
      </div>

      <div class="flex gap-2 justify-end">
        <button (click)="fecharModal()"
          class="px-4 py-1.5 rounded-lg text-xs text-gray-400 hover:text-gray-200 transition">Cancelar</button>
        <button (click)="salvar()" [disabled]="!form.nome.trim()"
          class="px-4 py-1.5 rounded-lg text-xs font-semibold bg-cyan-600 hover:bg-cyan-500 text-white transition disabled:opacity-40">
          Salvar
        </button>
      </div>

    </div>
  </div>
}
